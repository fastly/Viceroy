name: Test Rust versions

on:
  schedule:
    - cron: "2 13 * * 1"
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        rust: [stable, beta, nightly]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: true
    - name: Install Rust
      run: rustup default ${{ matrix.rust }}
    - run: make ci
