version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    allow:
      - dependency-type: all
    labels:
      - skip-changelog
    groups:
      cargo-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - github-actions
      - skip-changelog
    groups:
      gha-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 7
