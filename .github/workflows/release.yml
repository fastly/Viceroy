name: Release

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        runner: [ubuntu24.04-8cpu-32ram, macos-14, windows-2022]
        arch: [amd64, arm64]
        exclude:
          - runner: windows-2022
            arch: arm64
        include:
          - runner: ubuntu24.04-8cpu-32ram
            name: linux
            rust_abi: unknown-linux-gnu
          - runner: macos-14
            name: darwin
            rust_abi: apple-darwin
          - runner: windows-2022
            name: windows
            rust_abi: pc-windows-msvc
            extension: .exe
          - arch: arm64
            rust_arch: aarch64
          - arch: amd64
            rust_arch: x86_64

    runs-on: ${{ matrix.runner }}
    outputs:
      draft_release_id: ${{ steps.release.outputs.id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Install Rust
        run: rustup target add ${{ matrix.rust_arch }}-${{ matrix.rust_abi }}
        shell: bash

      - name: Install C cross-compilation toolchain
        if: ${{ matrix.name == 'linux' && matrix.arch != 'amd64' }}
        run: |
          sudo apt-get update
          sudo apt install -f -y gcc-${{ matrix.rust_arch }}-linux-gnu
          echo CC=${{ matrix.rust_arch }}-linux-gnu-gcc >> $GITHUB_ENV
          echo RUSTFLAGS='-C linker=${{ matrix.rust_arch }}-linux-gnu-gcc' >> $GITHUB_ENV

      - name: Extract tag name
        uses: olegtarasov/get-tag@v2.1.2
        id: tagName

      - name: Build
        run: |
          cargo build --profile=release-lto-stripped --workspace --locked --target=${{ matrix.rust_arch }}-${{ matrix.rust_abi }}

      - name: Package
        run: |
          cd target/${{ matrix.rust_arch }}-${{ matrix.rust_abi }}/release-lto-stripped
          tar czf viceroy_${{ steps.tagName.outputs.tag }}_${{ matrix.name }}-${{ matrix.arch }}.tar.gz viceroy${{ matrix.extension }}

      - name: Release
        if: github.event_name == 'push'
        id: release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: |
            target/${{ matrix.rust_arch }}-${{ matrix.rust_abi }}/release-lto-stripped/viceroy_${{ steps.tagName.outputs.tag }}_${{ matrix.name }}-${{ matrix.arch }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    steps:
      - name: publish
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.updateRelease({
              release_id: ${{ needs.build.outputs.draft_release_id }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              draft: false
            })
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-lib:
    needs: build
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    uses: fastly/devex-reusable-workflows/.github/workflows/publish-rust-crates-io-v1.yml@main
    with:
      crate_name: viceroy-lib
      expected_version: ${{ github.ref_name }}

  publish-bin:
    needs: publish-lib
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    uses: fastly/devex-reusable-workflows/.github/workflows/publish-rust-crates-io-v1.yml@main
    with:
      crate_name: viceroy
      expected_version: ${{ github.ref_name }}
